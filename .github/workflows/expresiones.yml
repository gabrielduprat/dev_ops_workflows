name: Expresion
on:
  workflow_dispatch:
    inputs:
      edad:
        description: 'Edad'
        required: true
        type: number
      nombre:
        description: 'Nombre'
        required: true
        default: 'Valor default'
        type: string
  push:
    branches: ["main"]
  issues:
    types:
      - closed
      - opened
env:
  AMBIENTE: produccion
  REGION: us-east
jobs:
  mayor:
    if: ${{ inputs.edad >= 18}}
    runs-on: ubuntu-latest
    steps:
      - name: Correr script
        run: echo ${{ inputs.nombre }} es mayor de edad
      - name: Mostrar nombre de evento
        run: echo ${{ github.event_name }}
      - name: Mostrar usuario
        run: echo ${{ github.actor }}
      - name: Retorna Ref
        run: echo ${{ github.ref }} - ${{ github.repository }} - {{ github.event.issue.title }}
      - id: obtener_version
        run: echo "version?1.0.0" >> $GITHUB_OUTPUT
      - run: echo ${{ steps.obtener_version.outputs.version }}
      - name: Mostrar variable de entorno
        run:  echo "Ambiente  - ${{ env.AMBIENTE }} - Region - ${{ env.REGION}}
  menor:
    if: ${{ inputs.edad < 18 }}
    runs-on: ubuntu-latest
    steps:
      - name: Correr script menor
        run: echo ${{ inputs.nombre }} es menor de edad
